<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO Sistemas - DN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .splash-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #2F8789;
        }

        .splash-circulo {
            width: 220px;
            height: 220px;
            background-color: #2BC394;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulsar 1.5s ease-in-out infinite;
        }

        .splash-circulo img {
            width: 150px;
        }

        .splash-texto {
            margin-top: 32px;
            font-size: 14px;
            color: #FFFFFF;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        @keyframes pulsar {
            0%   { transform: scale(1);    }
            50%  { transform: scale(1.05); }
            100% { transform: scale(1);    }
        }
    </style>
</head>
<body>

<div class="splash-container">
    <div class="splash-circulo">
        <img src="assets/logo-vertical.png" alt="ECO Sistemas">
    </div>
    <p class="splash-texto">Carregando...</p>
</div>

<script>
    // Aguarda 2.5 segundos e redireciona para a tela de login
    setTimeout(function() {
        window.location.href = 'login.html';
    }, 2500);
</script>

</body>
</html>
